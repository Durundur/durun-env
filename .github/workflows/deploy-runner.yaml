name: Deploy runner job

on:
  repository_dispatch: 
    types: [deploy-application]


jobs:
    deploy:
        runs-on: self-hosted

        steps:
          - name: Clean workspace
            run: rm -rf app-code

          - name: Checkout code
            uses: actions/checkout@v4
            with:
              repository: ${{ github.event.client_payload.repository }}
              ref: ${{ github.event.client_payload.ref }}
              path: app-code

          - name: Build docker image
            run: |
              cd app-code
              APP_NAME_LOWER=$(echo "${{ github.event.client_payload.app_name }}" | tr '[:upper:]' '[:lower:]')
              sudo docker build -t registry.gitlab.com/durundur/env-registry/${APP_NAME_LOWER}:latest .

          - name: Push docker image to registry
            run: |
              echo "${{ secrets.GITLAB_REGISTRY_TOKEN }}" | sudo docker login registry.gitlab.com -u "${{ secrets.GITLAB_REGISTRY_USER }}" --password-stdin
              APP_NAME_LOWER=$(echo "${{ github.event.client_payload.app_name }}" | tr '[:upper:]' '[:lower:]')
              sudo docker push registry.gitlab.com/durundur/env-registry/${APP_NAME_LOWER}:latest

          - name: Deploy container to server
            env:
              DEPLOY_TARGET: ${{ github.event.client_payload.deploy_target }}
              APP_NAME_RAW: ${{ github.event.client_payload.app_name }}
              HOST_PORT: ${{ github.event.client_payload.host_port }}
              CONTAINER_PORT: ${{ github.event.client_payload.container_port }}
              ENV_VARIABLES_JSON: ${{ toJson(github.event.client_payload.env_variables) }}
            run: |
              if [ "$DEPLOY_TARGET" = "oracle1" ]; then
                SERVER_HOST="${{ secrets.ORACLE_1_SERVER_HOST }}"
                SERVER_USER="${{ secrets.ORACLE_1_SERVER_USER }}"
                SERVER_KEY="${{ secrets.ORACLE_1_SERVER_KEY }}"
              elif [ "$DEPLOY_TARGET" = "oracle2" ]; then
                SERVER_HOST="${{ secrets.ORACLE_2_SERVER_HOST }}"
                SERVER_USER="${{ secrets.ORACLE_2_SERVER_USER }}"
                SERVER_KEY="${{ secrets.ORACLE_2_SERVER_KEY }}"
              fi

              echo "$SERVER_KEY" > private_key.pem
              chmod 600 private_key.pem

              APP_NAME=$(echo "$APP_NAME_RAW" | tr '[:upper:]' '[:lower:]')
              IMAGE_URL="registry.gitlab.com/durundur/env-registry/${APP_NAME}:latest"

              ssh -i private_key.pem -o StrictHostKeyChecking=no ${SERVER_USER}@${SERVER_HOST} "
                sudo mkdir -p /apps/${APP_NAME} && \
                sudo chown -R \$(whoami):\$(whoami) /apps/${APP_NAME} && \
                echo '${ENV_VARIABLES_JSON}' | jq -r 'to_entries | .[] | \"\(.key)=\(.value)\"' > /apps/${APP_NAME}/app.env && \
                echo '${{ secrets.GITLAB_REGISTRY_TOKEN }}' | sudo docker login registry.gitlab.com -u '${{ secrets.GITLAB_REGISTRY_USER }}' --password-stdin && \
                sudo docker pull ${IMAGE_URL} && \
                sudo docker stop ${APP_NAME} || true && \
                sudo docker rm ${APP_NAME} || true && \
                sudo docker run -d \
                --name ${APP_NAME} \
                --restart always \
                -p ${HOST_PORT}:${CONTAINER_PORT} \
                --env-file /apps/${APP_NAME}/app.env \
                ${IMAGE_URL}
              "
