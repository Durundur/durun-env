name: Deploy Nginx Reverse Proxy Config

on:
  push:
    branches: [ main ]
    paths:
      - 'reverse-proxy/**'
      - '.github/workflows/deploy-reverse-proxy.yml'

env:
  SSH_HOST: ${{ secrets.REVERSE_PROXY_SERVER_HOST }}
  SSH_PORT: ${{ secrets.REVERSE_PROXY_SERVER_HOST_PORT }}
  SSH_USER: ${{ secrets.REVERSE_PROXY_SERVER_USER }}
  SSH_PASS: ${{ secrets.REVERSE_PROXY_SERVER_PASSWORD }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Inject secrets into Nginx config
      env:
        FILES_DURUNDUR_ONLINE_URL: ${{ secrets.FILES_DURUNDUR_ONLINE_URL }}
      run: |
        envsubst '${FILES_DURUNDUR_ONLINE_URL}' < reverse-proxy/sites-available/files.durundur.online.conf > reverse-proxy/sites-available/files.durundur.online.conf.tmp
        mv reverse-proxy/sites-available/files.durundur.online.conf.tmp reverse-proxy/sites-available/files.durundur.online.conf

    - name: Test Nginx Config
      run: |
        docker run --rm \
          --entrypoint /bin/sh \
          -v ${{ github.workspace }}/reverse-proxy/nginx.conf:/etc/nginx/nginx.conf:ro \
          -v ${{ github.workspace }}/reverse-proxy/sites-available:/etc/nginx/http.d:ro \
          nginx:1.27.0-alpine3.19 -c "adduser -D www && rm -f /etc/nginx/conf.d/default.conf && nginx -t"

    - name: Copy files to temporary directory
      uses: appleboy/scp-action@master
      with:
        host: ${{ env.SSH_HOST }}
        port: ${{ env.SSH_PORT }}
        username: ${{ env.SSH_USER }}
        password: ${{ env.SSH_PASS }}
        source: "reverse-proxy/nginx.conf,reverse-proxy/sites-available/*"
        target: "~/nginx-tmp"

    - name: Move config and Reload Nginx
      uses: appleboy/ssh-action@master
      with:
        host: ${{ env.SSH_HOST }}
        port: ${{ env.SSH_PORT }}
        username: ${{ env.SSH_USER }}
        password: ${{ env.SSH_PASS }}
        envs: SSH_PASS
        script: |
          echo "$SSH_PASS" | sudo -S cp ~/nginx-tmp/reverse-proxy/nginx.conf /etc/nginx/nginx.conf
          echo "$SSH_PASS" | sudo -S cp -r ~/nginx-tmp/reverse-proxy/sites-available/* /etc/nginx/http.d/
          rm -rf ~/nginx-tmp
          echo "$SSH_PASS" | sudo -S nginx -t && echo "$SSH_PASS" | sudo -S nginx -s reload