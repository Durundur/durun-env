server {
    listen 80;
    listen [::]:80;

    server_name durundur.online;
    root /home/frog/durundur.online;

    location ~ /\.git {
        deny all;
    }

    location / {
        index index.html;
        try_files $uri $uri/ =404;
    }

    location /files/ {
        alias /home/frog/durundur.online/files/;
        autoindex on;
        autoindex_exact_size off;
        autoindex_localtime on;
    }
}
